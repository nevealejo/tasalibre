# BLOQUE 28e: sincronización mensual de la red Tokko a Supabase.
#
# Este archivo va en el repo en: .github/workflows/sync-tokko.yml
#
# GitHub Actions ya NO le habla a Tokko directamente (confirmado en vivo:
# Tokko devuelve 405 a cualquier request desde los runners de GH Actions,
# probablemente por bloqueo de IP/origen). Este workflow solo ORQUESTA: en
# cada corrida llama repetidas veces al endpoint _syncTokkoChunk de
# api/tasar.js en Vercel, que es quien realmente le habla a Tokko (mismo
# origen que ya funciona en producción) y escribe en Supabase.
#
# Requiere un solo secret en GitHub (Settings → Secrets and variables →
# Actions → New repository secret):
#   SYNC_SECRET   (mismo valor exacto que la variable SYNC_SECRET en Vercel)
#
# También requiere que sync-tokko-network.js esté en el repo (scripts/).
#
# Se puede disparar manualmente desde la pestaña "Actions" del repo
# (workflow_dispatch) para probar sin esperar al día 1 del mes.

name: Sync red Tokko a Supabase

on:
  schedule:
    # Día 1 de cada mes, 6:00 UTC (3:00 AM Argentina).
    - cron: "0 6 1 * *"
  workflow_dispatch:
    inputs:
      modo_test:
        description: "Modo prueba (--test): 1 sola llamada al endpoint, sin loop completo. Dejar en true la primera vez."
        type: boolean
        default: true

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 300
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Correr sincronización
        env:
          SYNC_SECRET: ${{ secrets.SYNC_SECRET }}
        run: node scripts/sync-tokko-network.js ${{ (github.event.inputs.modo_test || 'false') == 'true' && '--test' || '' }}
